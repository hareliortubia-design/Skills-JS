# client-profile.yaml — ISCO Industries
# Used by: all JumpSeat base skills (deep-research, icp-fit-scoring, signal-research,
#           conviction-algorithm, dossier-builder, email-personalization, crm-export)
# Version: 0.5 — MVP draft from public web research
# Built by: Hareli Ortubia | June 2026
# Status: Draft — 8 gaps need discovery session with ISCO team
#
# GAP LEGEND:
#   # GAP-[N] — [what's missing] — [how to get it]
# ─────────────────────────────────────────────

# ─────────────────────────────────────────────
# 1. CLIENT
# ─────────────────────────────────────────────

client:
  name: "ISCO Industries"
  description: >
    North America's largest distributor, manufacturer, and fabricator of HDPE
    (high-density polyethylene) pipe, fittings, and fusion equipment. Family-owned,
    60+ years in business, serving 18+ industries across 9 US territories and
    internationally. Sells products, custom fabrication, equipment rental, and
    technical services for large-scale infrastructure piping projects.
  service: "HDPE pipe products, fabrication, and fusion equipment for infrastructure projects"
  buyers:
    - "Project Engineer"
    - "Civil Engineer"
    - "Piping Engineer"
    - "Procurement Manager"
    - "Purchasing Manager"
    - "Project Manager"
    - "Director of Engineering"
    # GAP-1 — Confirm exact title that signs the PO vs. who influences —
    #          needs discovery session with ISCO sales team
  deal_profile:
    type: "Project-based purchase (pipe + equipment + services per project)"
    sales_cycle: "1–12 months depending on project scale"  # GAP-2 — Confirm with ISCO
    relationship_driven: true
  research_keywords:
    - "HDPE pipe"
    - "piping engineer"
    - "pipeline project manager"
    - "fusion technician"
    - "HDPE fusion"
    - "pipeline construction"
    - "civil engineer infrastructure"
    - "procurement manager utilities"
    # These feed skill-deep-research Phase 2 (JobSpy).
    # What prospects post when they're staffing a project ISCO would supply.

# ─────────────────────────────────────────────
# 2. ICP CRITERIA
# ─────────────────────────────────────────────

icp:
  summary: >
    Organizations planning or executing large-scale infrastructure projects
    that require HDPE piping — primarily in municipal water, oil & gas,
    mining, data centers, and industrial construction — with capital budget
    authority and technical decision-makers on staff.
  criteria:
    - criterion: "Infrastructure-intensive vertical"
      values:
        - "Municipal water / utilities"
        - "Oil & gas"
        - "Mining & aggregate"
        - "Data centers"
        - "EPC contractors (engineering, procurement, construction)"
        - "Industrial / power generation"
        - "Renewable energy"
        - "Landfill"
        - "Culvert rehabilitation"
      points: 2
      how_to_evaluate: "Industry classification + presence of large-scale piping infrastructure"

    - criterion: "Capital project scale — large or complex piping requirement"
      points: 2
      how_to_evaluate: >
        Project value or scope suggests significant HDPE volume.
        Proxy: project mentions miles of pipeline, facility size 100K+ sq ft,
        or multi-phase construction.
        # GAP-3 — Confirm minimum deal size / project revenue threshold with ISCO

    - criterion: "Technical decision-maker on staff (engineer or PM role)"
      points: 2
      how_to_evaluate: >
        LinkedIn or website shows engineering or procurement department.
        Large enough to have in-house project management capacity.

    - criterion: "Active capital spend or project pipeline"
      points: 2
      how_to_evaluate: >
        Evidence of funded project: permit filed, bond approved,
        federal grant awarded (IIJA/EPA), or announced expansion.

    - criterion: "US-based or international project with US procurement"
      points: 2
      how_to_evaluate: "Project located in US, or international project managed from US office"

  exclusions:
    industries_out:
      - "Residential construction (small-scale — not ISCO's segment)"
      - "Retail / consumer goods (no piping infrastructure relevance)"
      # GAP-4 — Confirm explicit disqualifiers with ISCO sales team
    excluded_domains: []
    # GAP-5 — Add known competitors and existing customers to exclude

  tier_thresholds:
    tier_1:
      range: "8–10"
      action: "Run full signal research immediately"
    tier_2:
      range: "5–7"
      action: "Run signal research, lower priority queue"
    not_icp:
      range: "1–4"
      action: "Skip — do not invest in signal research"

# ─────────────────────────────────────────────
# 3. CONVICTION THRESHOLDS
# ─────────────────────────────────────────────

conviction:
  levels:
    high:
      min_confirmed_signals: 7
      action: "Build dossier immediately. Outreach this week."
    medium:
      min_confirmed_signals: 3
      action: "Research signal gaps. Queue for next sprint."
    pending:
      condition: "Strong ICP fit but 0–2 confirmed signals"
      action: "Monitor queue. Define reactivation triggers. Never discard."
    low:
      condition: "Weak ICP fit and 0–2 confirmed signals"
      action: "Do not prioritize."
  rules:
    - "PENDING ≠ LOW. PENDING = strong fit, wrong timing. Set reactivation condition."
    - "DX signals have two impact levels: STOP (hard PENDING) or FLAG (proceed with caution). Check impact field."
    - "DX-01 (CEO outside role) = FLAG for ISCO. Buyer is Project Engineer / Procurement Manager, not CEO."
    - "DX-02 (financial distress) and DX-03 (project cancelled / capex freeze) = STOP."
    - "Always build dossier if PJ-01 + PJ-02 are both confirmed — active funded project = NOW."

# ─────────────────────────────────────────────
# 4. SIGNAL LIBRARY
# ─────────────────────────────────────────────
# v0.5 draft — built from web research and ISCO business model inference
# Needs validation workshop with ISCO team before locking
# Run skill-signal-hunter after discovery session to refine and expand

signals:

  # ── PROJECT SIGNALS (PJ) ─────────────────────
  # Core buying trigger for ISCO — a project exists = a sale is possible

  - code: "PJ-01"
    name: "New Infrastructure Project Announced"
    category: "Project"
    stack: "Lead"
    obvious: false
    weight: 2.0
    priority_note: "HIGHEST VALUE SIGNAL. Greenfield project = no incumbent. Window is now."
    what_it_means: >
      A new pipeline, water system, mine facility, or industrial plant has been
      publicly announced. This is a greenfield opportunity — no incumbent HDPE supplier
      to displace. ISCO can be spec'd in from day one.
    how_to_detect: >
      Company press releases, trade press (Water Finance & Management, Oil & Gas Journal,
      Mining.com, Data Center Frontier), state/federal grant announcements,
      construction trade news.
    sources:
      - "Company newsroom"
      - "Trade publications"
      - "State infrastructure department press releases"
      - "Federal Register (EPA, DOT infrastructure grants)"
    classification:
      C: "Project announced with location, scale, and timeline"
      I: "Expansion mentioned without confirmed pipeline/piping scope"
      N: "No new project found"

  - code: "PJ-02"
    name: "Construction Permit Filed"
    category: "Project"
    stack: "Lead"
    obvious: false
    weight: 2.0
    what_it_means: >
      Active permit = project is funded and moving. This is the procurement
      window — HDPE supplier decisions happen 3–6 months before construction start.
    how_to_detect: >
      State/county permit databases, Dodge Data & Analytics, ConstructConnect,
      Building Permits Pro. Search by company name or project address.
    sources:
      - "Dodge Data & Analytics"
      - "ConstructConnect"
      - "State environmental / construction permit databases"
      - "County permit records"
    classification:
      C: "Permit number found with project description and applicant name"
      I: "Construction announced but permit not yet confirmed"
      N: "No permit found"

  - code: "PJ-03"
    name: "Federal or State Infrastructure Funding Awarded"
    category: "Project"
    stack: "Lead"
    obvious: true
    weight: 1.5
    what_it_means: >
      IIJA (Infrastructure Investment and Jobs Act), EPA Water Infrastructure,
      or state-level grant = capital is committed. Projects with federal funding
      move faster and can't stall on materials.
    how_to_detect: >
      EPA WIFIA loan announcements, USDA Water & Waste Disposal grants,
      DOT BUILD grants, state infrastructure press releases.
    sources:
      - "EPA.gov news"
      - "USDA.gov grants"
      - "DOT.gov grants"
      - "State infrastructure agency press releases"
    classification:
      C: "Grant or loan confirmed with amount, recipient, and project description"
      I: "Funding application mentioned but award not confirmed"
      N: "No federal/state funding found"

  - code: "PJ-04"
    name: "RFQ / Tender Issued for Piping Materials"
    category: "Project"
    stack: "Lead"
    obvious: false
    weight: 2.0
    priority_note: "Active procurement = immediate outreach window."
    what_it_means: >
      Organization is actively soliciting bids for pipe, fittings, or fusion
      equipment. Procurement window is open right now.
    how_to_detect: >
      SAM.gov (federal tenders), DemandStar, BidNet, state procurement portals,
      company procurement pages.
    sources:
      - "SAM.gov"
      - "DemandStar"
      - "BidNet"
      - "State procurement portals"
    classification:
      C: "RFQ found with HDPE / pipe specification and issue date"
      I: "Tender for infrastructure project mentioned without confirmed pipe spec"
      N: "No active RFQ found"

  # ── LEADERSHIP SIGNALS (LS) ──────────────────

  - code: "LS-01"
    name: "New Engineering or Procurement Leader Hired (last 18 months)"
    category: "Leadership"
    stack: "Lead"
    obvious: false
    weight: 2.0
    priority_note: "New technical leaders evaluate all preferred supplier relationships. Window closes fast."
    what_it_means: >
      New VP Engineering, Chief Engineer, Director of Procurement, or Director of
      Capital Projects is reviewing incumbent suppliers and open to alternatives.
      First 12–18 months = vendor evaluation window.
    how_to_detect: >
      LinkedIn hiring announcements, company press releases,
      executive profile start dates vs. current date.
    sources:
      - "LinkedIn"
      - "Company newsroom"
      - "PR Newswire"
    classification:
      C: "Hire confirmed with start date in last 18 months"
      I: "Role posted but hire not yet confirmed"
      N: "No relevant leadership change in last 18 months"

  # ── GROWTH SIGNALS (GR) ──────────────────────

  - code: "GR-01"
    name: "Facility Expansion or Mine / Plant Scale-Up Announced"
    category: "Growth"
    stack: "Lead"
    obvious: false
    weight: 1.5
    what_it_means: >
      Expansion = new piping infrastructure required. No existing system
      to work around — ISCO can be designed in from spec.
    how_to_detect: >
      Company press releases, earnings calls, mining trade press
      (Mining.com, MINING.COM, S&P Global), industrial construction news.
    sources:
      - "Company newsroom"
      - "Mining trade press"
      - "Industrial construction news"
      - "SEC 8-K filings (public companies)"
    classification:
      C: "Expansion confirmed with location and scope"
      I: "Growth mentioned without confirmed physical expansion"
      N: "No expansion found"

  - code: "GR-02"
    name: "M&A Activity (acquisition or merger)"
    category: "Growth"
    stack: "Lead"
    obvious: true
    weight: 1.5
    what_it_means: >
      Post-acquisition: new facilities to retrofit, new supplier relationships
      to establish. Procurement consolidation = ISCO can pitch preferred supplier status
      across the combined entity.
    how_to_detect: >
      SEC 8-K, press releases, Bloomberg, Reuters, trade press.
    sources:
      - "SEC EDGAR"
      - "Bloomberg"
      - "Reuters"
      - "Trade publications"
    classification:
      C: "Deal confirmed with press or SEC filing"
      I: "Rumored or in due diligence"
      N: "No M&A activity found"

  - code: "GR-03"
    name: "Data Center Development Announced"
    category: "Growth"
    stack: "Lead"
    obvious: false
    weight: 1.5
    what_it_means: >
      New data center = large-diameter HDPE for cooling and utility infrastructure.
      High-dollar, technically complex project. ISCO cited data centers as a key market.
    how_to_detect: >
      Data Center Frontier, Data Center Knowledge, company press releases,
      construction permits in known data center corridors (VA, TX, AZ, OR, GA).
    sources:
      - "Data Center Frontier"
      - "Data Center Knowledge"
      - "Construction permit databases"
      - "Company press releases"
    classification:
      C: "Data center project confirmed with location and MW capacity"
      I: "Data center presence mentioned without confirmed new development"
      N: "No new data center found"

  # ── REGULATORY / COMPLIANCE SIGNALS (RC) ─────

  - code: "RC-01"
    name: "EPA or State Water Quality Mandate / Compliance Deadline"
    category: "Regulatory"
    stack: "Lead"
    obvious: false
    weight: 1.5
    what_it_means: >
      Regulatory deadline forces infrastructure replacement or upgrade.
      HDPE pipe is the standard replacement for aging concrete and steel water mains.
      Compliance deadlines create non-discretionary buying windows.
    how_to_detect: >
      EPA Safe Drinking Water Act enforcement actions, state PUC orders,
      PFAS remediation mandates, lead pipe replacement programs.
    sources:
      - "EPA enforcement database"
      - "State public utility commission orders"
      - "Local government meeting minutes"
      - "Water trade press (Water Finance & Management)"
    classification:
      C: "Regulatory order confirmed with utility name and deadline"
      I: "Compliance need mentioned without confirmed enforcement action"
      N: "No regulatory pressure found"

  - code: "RC-02"
    name: "Culvert Failure or Aging Infrastructure Report"
    category: "Regulatory"
    stack: "Support"
    obvious: false
    weight: 1.25
    what_it_means: >
      Failed or rated-poor infrastructure = rehabilitation program coming.
      ISCO's Snap-Tite culvert rehab (no-dig) is a specific solution for this.
    how_to_detect: >
      State DOT infrastructure condition reports, local news on road/drainage failures,
      FHWA bridge and culvert condition data.
    sources:
      - "State DOT annual reports"
      - "FHWA infrastructure data"
      - "Local government press releases"
      - "Regional news"
    classification:
      C: "Failed infrastructure confirmed with jurisdiction and project scope"
      I: "Aging infrastructure mentioned without confirmed rehab program"
      N: "No culvert / infrastructure issue found"

  # ── FINANCIAL SIGNALS (FN) ───────────────────

  - code: "FN-01"
    name: "Capital Budget Approved or Increased"
    category: "Financial"
    stack: "Support"
    obvious: true
    weight: 1.25
    what_it_means: >
      Confirmed capex = real buying power. Especially relevant for municipal
      utilities (bond referendums) and publicly-traded companies (earnings calls).
    how_to_detect: >
      Earnings call transcripts (public companies), municipal bond issuances,
      city/county budget approvals, company investor presentations.
    sources:
      - "Seeking Alpha earnings transcripts"
      - "Municipal bond databases (MuniOS, Bloomberg MUNI)"
      - "City/county council meeting minutes"
      - "Company investor presentations"
    classification:
      C: "Budget approved with dollar amount and project scope"
      I: "Capital commitment mentioned without confirmed amount"
      N: "No capex confirmation found"

  - code: "FN-02"
    name: "PE Ownership or PE-Backed"
    category: "Financial"
    stack: "Support"
    obvious: true
    weight: 1.0
    what_it_means: >
      PE-backed companies have capital project cycles tied to portfolio optimization.
      Tend to consolidate preferred suppliers = opportunity to become preferred HDPE vendor.
    how_to_detect: >
      PitchBook, Crunchbase, company press releases, SEC filings.
    sources:
      - "PitchBook"
      - "Crunchbase"
      - "SEC EDGAR"
    classification:
      C: "PE firm confirmed as owner with source"
      I: "Ownership structure suggests PE without direct confirmation"
      N: "Public or family-owned confirmed"

  # ── SUSTAINABILITY SIGNALS (SU) ──────────────

  - code: "SU-01"
    name: "Carbon Reduction / Sustainability Commitment Published"
    category: "Sustainability"
    stack: "Support"
    obvious: true
    weight: 1.0
    what_it_means: >
      HDPE pipe has lower lifecycle carbon than steel or concrete alternatives.
      ESG commitments = receptive audience for ISCO's sustainability argument.
    how_to_detect: >
      Company sustainability report, ESG commitments page, CDP disclosure,
      Science Based Targets initiative (SBTi) registry.
    sources:
      - "Company sustainability report"
      - "CDP database"
      - "SBTi registry"
    classification:
      C: "Carbon or Scope 3 targets published with year and baseline"
      I: "ESG commitment mentioned without Scope 3 specifics"
      N: "No sustainability reporting found"

  # ── COMPETITIVE / CONTEXT SIGNALS (CT) ───────

  - code: "CT-01"
    name: "Incumbent HDPE Supplier Known"
    category: "Competitive"
    stack: "Context"
    obvious: false
    weight: 1.0
    what_it_means: >
      If the current HDPE supplier is known, ISCO can craft displacement
      messaging around known weaknesses (availability, lead time, fabrication capability).
    how_to_detect: >
      LinkedIn profiles of procurement team (endorsements, past employers),
      project bid documents (public tenders often name approved suppliers),
      industry contacts.
    sources:
      - "LinkedIn"
      - "Public bid documents (SAM.gov, state portals)"
      - "Industry contacts"
    classification:
      C: "Supplier named with source"
      I: "In-house fabrication confirmed (no external supplier)"
      N: "Unknown"

  - code: "CT-02"
    name: "Competitor HDPE Supplier Recently Won Project"
    category: "Competitive"
    stack: "Context"
    obvious: false
    weight: 1.0
    what_it_means: >
      Recent competitor win at this account = active HDPE buying cycle confirmed.
      ISCO missed this one — next project is the target.
    how_to_detect: >
      Public bid award announcements, trade press, construction news.
    sources:
      - "Public bid award databases"
      - "Trade publications"
      - "Construction news"
    classification:
      C: "Competitor win confirmed with source and date"
      I: "Competitor relationship mentioned without confirmed project"
      N: "No competitor activity found"

# ─────────────────────────────────────────────
# 5. DISTRACTION SIGNALS
# ─────────────────────────────────────────────

distraction_signals:
  rule: >
    Research distraction signals BEFORE building outreach. Each DX signal has its
    own impact level: STOP (hard PENDING — do not outreach) or FLAG (note in dossier,
    proceed if Lead signals are confirmed). Check the impact field per signal.

  signals:
    - code: "DX-01"
      name: "CEO or Owner Accepting Outside Role / Distraction"
      what_it_means: >
        Leadership attention moving away from operational decisions.
        Matters less for ISCO than for some clients — buyer is typically
        Project Engineer or Procurement Manager, not CEO.
      how_to_detect: "News search, LinkedIn, press releases"
      classification:
        C: "Confirmed with source and date"
        N: "No outside role found"
      impact: "FLAG"
      impact_detail: >
        ISCO's buyer is Project Engineer / Procurement Manager / Director of Engineering —
        NOT the CEO. A CEO accepting an outside role does NOT block technical outreach.
        Action: note in dossier. Proceed if at least one Lead signal (PJ-01, PJ-02, LS-01)
        is confirmed.

    - code: "DX-02"
      name: "Company in Active Financial Distress or Bankruptcy"
      what_it_means: >
        Financial crisis = no capex decisions. Projects get cancelled or frozen.
        No point in outreach until restructuring is resolved.
      how_to_detect: "SEC filings, court records, news search, Chapter 11 filings"
      classification:
        C: "Bankruptcy or restructuring confirmed with source"
        N: "No financial distress found"
      impact: "STOP"
      impact_detail: "CONFIRMED → move to PENDING. No capex decisions under financial distress. Define reactivation trigger."

    - code: "DX-03"
      name: "Project Cancelled, Delayed, or Capex Freeze Announced"
      what_it_means: >
        The specific project ISCO was targeting is cancelled or the company has
        announced a freeze on capital spending. Window is closed — for now.
      how_to_detect: >
        Company press releases, earnings calls mentioning capex cuts,
        project cancellation news in trade press.
      classification:
        C: "Cancellation or freeze confirmed with date and scope"
        N: "No cancellation found"
      impact: "STOP"
      impact_detail: "CONFIRMED → move to PENDING. Track for reactivation when project resumes or capex freeze lifts."

# ─────────────────────────────────────────────
# 6. SIGNAL COMBOS (bonus conviction when both confirmed)
# ─────────────────────────────────────────────

signal_combos:
  - signals: ["PJ-01", "PJ-02"]
    bonus: 2.0
    story: "Announced + permitted = active funded project. Procurement window is NOW."
  - signals: ["PJ-03", "PJ-01"]
    bonus: 1.5
    story: "Federal funding awarded + project announced = non-discretionary buy. Fast moving."
  - signals: ["LS-01", "GR-01"]
    bonus: 1.5
    story: "New engineering leader + facility expansion = vendor evaluation window wide open."
  - signals: ["PJ-04", "CT-01"]
    bonus: 1.0
    story: "Active RFQ + incumbent known = targeted displacement opportunity."
  - signals: ["RC-01", "PJ-01"]
    bonus: 1.5
    story: "Regulatory mandate + announced project = compliance-driven non-discretionary purchase."

