# ─────────────────────────────────────────────
# 8. EMAIL RULES
# ─────────────────────────────────────────────

email_rules:
  email_1_max_words: 75
  email_2_max_words: 35
  tone: "Technical, peer-to-peer, expertise-led. Engineering and procurement register."
  # GAP-6 — Confirm tone and CTA with ISCO team (do they want meetings? demos? site visits?)
  structure:
    email_1:
      line_1: "Specific observation about their project or infrastructure situation — not a question"
      lines_2_3: "1–2 confirmed signals showing you've done the research on their specific project"
      final_line: "One soft question tied to the project — not a meeting request"
    email_2:
      content: "Callback to the lead signal (the project). One direct question. Nothing else."
  hard_rules:
    - "Never pitch. Never mention ISCO's product line explicitly in Email 1."
    - "No 'I hope this finds you well.' No 'I wanted to reach out.'"
    - "Line 1 must be a specific observation — not a question."
    - "End Email 1 with one soft question. Not a meeting request."
    - "Email 2 must stand alone. Never open with 'Following up'."
    - "Email 1 > 75 words → rewrite. Email 2 > 35 words → rewrite. Never send over limit."
    - "Lead signal must be PJ/LS/GR/RC — not a context signal alone."
  offer:
    primary_cta: "GAP-7 — Confirm with ISCO: what do they ask in Email 1? (technical consult? spec review? site visit?)"
    lead_magnet: "Inferred: free pipe specification review or project engineering consultation"

# ─────────────────────────────────────────────
# 9. CRM EXPORT
# ─────────────────────────────────────────────

crm:
  platform: "GAP-8 — Confirm CRM platform with ISCO (Salesforce / HubSpot / Other)"
  object: "Account"
  fields:
    account_name: "Account Name"
    industry: "Industry"
    state: "Billing State"
    revenue: "Annual Revenue"
    fit_tier: "ISCO_Fit_Tier__c"
    fit_score: "ISCO_Fit_Score__c"
    conviction_score: "ISCO_Conviction_Score__c"
    weighted_score: "ISCO_Weighted_Score__c"
    urgency: "ISCO_Urgency__c"
    top_signal: "ISCO_Lead_Signal__c"
    signal_date: "ISCO_Signal_Date__c"
    confirmed_signals: "ISCO_Confirmed_Signals__c"
    dossier_status: "ISCO_Dossier_Status__c"
    next_action: "ISCO_Next_Action__c"
    stack_notes: "ISCO_Stack_Notes__c"
    last_updated: "ISCO_Last_Updated__c"
  next_action_logic:
    CRITICAL: "Outreach this week"
    HIGH_dossier_complete: "Outreach ready"
    HIGH_dossier_pending: "Build dossier"
    MEDIUM: "Research signal gaps"
    stale_flags_present: "Re-verify signals"
  constraints:
    stack_notes_max_chars: 200
    date_format: "YYYY-MM-DD"
    urgency_values: ["CRITICAL", "HIGH", "MEDIUM", "LOW"]
    dossier_status_values: ["Complete", "Pending"]

