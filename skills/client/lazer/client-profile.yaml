# ─────────────────────────────────────────────
# 8. EMAIL RULES
# ─────────────────────────────────────────────

email_rules:
  email_1_max_words: 75
  email_2_max_words: 35
  tone: "Direct, peer-to-peer, confident. Supply chain / operations register."
  structure:
    email_1:
      line_1: "Specific observation about their operation or current situation — not a question"
      lines_2_3: "2–3 confirmed signals as one-liners with what's happening at their yards"
      final_line: "One soft question — not a meeting request"
    email_2:
      content: "Callback to the lead signal. One direct question. Nothing else."
  hard_rules:
    - "Never pitch. Never mention Lazer's services explicitly."
    - "No 'I hope this finds you well.' No 'I wanted to reach out.'"
    - "Line 1 must be a specific observation — not a question."
    - "End Email 1 with one soft question. Not a meeting request."
    - "Email 2 must stand alone. Never open with 'Following up'."
    - "Email 1 > 75 words → rewrite. Email 2 > 35 words → rewrite. Never send over limit."
    - "Lead signal must be LS/LB/GR/FN/SU — not a YP structural signal alone."

