# client-profile.yaml — Lazer Logistics
# Used by: all JumpSeat base skills (deep-research, icp-fit-scoring, signal-research,
#           conviction-algorithm, dossier-builder, email-personalization, crm-export)
# Version: 1.0 | Built by: Hareli Ortubia | June 2026

# ─────────────────────────────────────────────
# 1. CLIENT
# ─────────────────────────────────────────────

client:
  name: "Lazer Logistics"
  description: >
    Largest yard management and spotting services company in North America.
    Moves trailers inside distribution yards for retailers, food & beverage
    companies, and industrial manufacturers. Service is called "spotting" —
    measured in moves per hour.
  service: "Yard management and spotting services"
  buyers:
    - "VP Supply Chain"
    - "VP Logistics"
    - "VP DC Operations"
    - "Director of Transportation"
    - "SVP Operations"
  deal_profile:
    type: "Multi-year contract"
    sales_cycle: "6–18 months"
    relationship_driven: true
  research_keywords:
    - "spotter driver"
    - "yard truck driver"
    - "hostler driver"
    - "yard jockey"
    - "yard management"
    - "spotting services"

# ─────────────────────────────────────────────
# 2. ICP CRITERIA
# ─────────────────────────────────────────────

icp:
  summary: >
    Large manufacturers, retailers, and 3PLs with high-volume distribution
    yards that require 24/7 trailer movement and cannot staff yard operations
    cost-effectively in-house.
  criteria:
    - criterion: "Distribution-heavy vertical"
      values: ["Food & Beverage", "Retail", "Industrial", "3PL", "Packaging"]
      points: 2
      how_to_evaluate: "Industry classification"
    - criterion: "Revenue $500M+"
      points: 2
      how_to_evaluate: "Public revenue data or estimate"
    - criterion: "Multi-site network (3+ DCs)"
      points: 2
      how_to_evaluate: "Company website, SEC filings"
    - criterion: "High-volume trailer ops (drop-and-hook model)"
      points: 2
      how_to_evaluate: "Business model inference"
    - criterion: "US-based primary operations"
      points: 2
      how_to_evaluate: "HQ location"
  tier_thresholds:
    tier_1:
      range: "8–10"
      action: "Run full signal research immediately"
    tier_2:
      range: "5–7"
      action: "Run signal research, lower priority queue"
    not_icp:
      range: "1–4"
      action: "Skip — do not invest in signal research"

# ─────────────────────────────────────────────
# 3. CONVICTION THRESHOLDS
# ─────────────────────────────────────────────

conviction:
  levels:
    high:
      min_confirmed_signals: 7
      action: "Build dossier immediately. Outreach this week."
    medium:
      min_confirmed_signals: 3
      action: "Research signal gaps. Queue for next sprint."
    pending:
      condition: "Strong ICP fit but 0–2 confirmed signals"
      action: "Monitor queue. Define reactivation triggers. Never discard."
    low:
      condition: "Weak ICP fit and 0–2 confirmed signals"
      action: "Do not prioritize."
  rules:
    - "PENDING ≠ LOW. PENDING = strong fit, wrong timing. Set reactivation condition."
    - "DX signals have two impact levels: STOP (hard PENDING) or FLAG (proceed with caution). Check impact field — do not auto-PENDING on FLAG signals."
    - "DX-01 (CEO outside role) = FLAG for Lazer. Buyer is VP Supply Chain, not CEO. Note in dossier, proceed if Lead signals are confirmed."
    - "DX-02 (legal crisis) and DX-03 (mass layoff) = STOP. These affect the whole organization."
    - "Always build dossier if GR-01 or LS-01 is confirmed, regardless of raw signal count."

# ─────────────────────────────────────────────
# 4. SIGNAL LIBRARY
# ─────────────────────────────────────────────

signals:

  # ── YARD PROFILE (YP) ──────────────────────

  - code: "YP-01"
    name: "Drop-and-Hook Operations"
    category: "Yard Profile"
    stack: "Context"
    obvious: true
    weight: 1.0
    what_it_means: >
      Trailers are dropped at the facility without the cab. Spotters
      are operationally required — not optional.
    how_to_detect: >
      Job postings mentioning 'drop and hook', cold chain operations
      (food/bev), high-volume DC business model.
    sources:
      - "LinkedIn job postings"
      - "Company website"
      - "Industry press"
    classification:
      C: "Source found confirming drop-and-hook operations"
      I: "Inferred from business model (food/bev, high-volume retail DC)"
      N: "Drop-hook explicitly not used"

  - code: "YP-02"
    name: "24/7 Operations"
    category: "Yard Profile"
    stack: "Context"
    obvious: true
    weight: 1.0
    what_it_means: >
      Continuous operations require round-the-clock yard management —
      hard and expensive to staff internally.
    how_to_detect: >
      Job postings with '24/7' or 'rotating shifts'; refinery,
      manufacturing, or grocery distribution model.
    sources:
      - "Indeed"
      - "LinkedIn"
      - "Company careers page"
    classification:
      C: "Explicitly stated in job posting or press"
      I: "Inferred from business model (grocery DC, refinery, manufacturing)"
      N: "Operations confirmed as daytime only"

  - code: "YP-03"
    name: "50+ Dock Doors"
    category: "Yard Profile"
    stack: "Context"
    obvious: true
    weight: 1.0
    what_it_means: >
      Volume threshold where manual yard management breaks down and
      dedicated yard equipment becomes necessary.
    how_to_detect: >
      SEC 10-K facility descriptions, construction permits,
      real estate listings, company fact sheets.
    sources:
      - "SEC EDGAR"
      - "CoStar"
      - "Geocon construction records"
      - "Company press releases"
    classification:
      C: "Documented source confirms 50+ dock doors"
      I: "Inferred from sq footage or trailer volume data"
      N: "Facility data unavailable"

  - code: "YP-04"
    name: "200,000+ Sq Ft Facility"
    category: "Yard Profile"
    stack: "Context"
    obvious: true
    weight: 1.0
    what_it_means: >
      Scale qualifier — operations below this threshold rarely justify
      the cost of outsourced yard management.
    how_to_detect: >
      SEC filings, real estate records, earnings calls, company fact sheets.
    sources:
      - "SEC 10-K"
      - "Cushman & Wakefield"
      - "CBRE"
      - "Company press releases"
    classification:
      C: "Source confirmed sq footage at 200K+"
      I: "Inferred from revenue scale or DC count"
      N: "Facility size not found"

  - code: "YP-08"
    name: "Multi-Site Network (5+ locations)"
    category: "Yard Profile"
    stack: "Context"
    obvious: true
    weight: 1.0
    what_it_means: >
      Multi-site = higher ACV, expansion opportunity across network,
      standardization argument for Lazer.
    how_to_detect: >
      Company website DC locator, SEC filings, earnings calls.
    sources:
      - "Company website"
      - "SEC 10-K"
      - "Investor presentations"
    classification:
      C: "Location count confirmed at 5+"
      I: "Network mentioned without exact count"
      N: "Single site confirmed"

  # ── LEADERSHIP (LS) ────────────────────────

  - code: "LS-01"
    name: "New Supply Chain Leader (hired in last 18 months)"
    category: "Leadership"
    stack: "Lead"
    obvious: false
    weight: 2.0
    priority_note: "HIGHEST VALUE SIGNAL. New leaders evaluate all vendor relationships. Window closes fast."
    what_it_means: >
      New VP/Director of Supply Chain, Logistics, or DC Operations is
      evaluating all vendor relationships. This is the window.
    how_to_detect: >
      LinkedIn hiring announcements, company press releases,
      executive profile start dates.
    sources:
      - "LinkedIn"
      - "Company newsroom"
      - "PR Newswire"
    classification:
      C: "Hire confirmed with start date"
      I: "Role posted but hire not confirmed"
      N: "No leadership change in last 18 months"

  # ── LABOR (LB) ─────────────────────────────

  - code: "LB-01"
    name: "In-House Yard Jobs Currently Posted"
    category: "Labor"
    stack: "Lead"
    obvious: false
    weight: 1.5
    what_it_means: >
      They are trying to manage this themselves and actively hiring.
      Pitch angle: "we'll handle this for less than you're spending to hire."
    how_to_detect: >
      Search 'spotter driver', 'yard truck driver', 'hostler driver',
      'yard jockey' on Indeed, LinkedIn Jobs, company careers page.
    sources:
      - "Indeed"
      - "LinkedIn Jobs"
      - "ZipRecruiter"
      - "Company careers page"
    classification:
      C: "Active posting found with direct link"
      I: "Role described but no active posting currently live"
      N: "No posting found"

  - code: "LB-02"
    name: "Repeat Postings (same role posted 2+ times)"
    category: "Labor"
    stack: "Lead"
    obvious: false
    weight: 1.5
    what_it_means: >
      They can't fill the role. Pain is active and unresolved.
      Urgency is high — they've been trying and failing.
    how_to_detect: >
      Check posting history on Indeed — same role posted multiple
      times over 30–90 days. Most competitors miss this.
    sources:
      - "Indeed job history"
      - "LinkedIn job posting dates"
    classification:
      C: "2+ postings confirmed with dates"
      I: "One posting but long tenure (45+ days active)"
      N: "Single fresh posting only"

  # ── GROWTH (GR) ────────────────────────────

  - code: "GR-01"
    name: "New DC Opening Announced or Under Construction"
    category: "Growth"
    stack: "Lead"
    obvious: false
    weight: 2.0
    what_it_means: >
      Greenfield opportunity — they need yard management from day one.
      No incumbent to displace. Easiest conversation Lazer can have.
    how_to_detect: >
      Construction permits, real estate press, company press releases,
      earnings calls.
    sources:
      - "Geocon"
      - "CoStar"
      - "Company newsroom"
      - "Earnings transcripts"
    classification:
      C: "Opening confirmed with location and expected date"
      I: "Expansion mentioned without specific DC confirmation"
      N: "No new facility found"

  - code: "GR-02"
    name: "M&A Activity (acquisition, merger, or divestiture)"
    category: "Growth"
    stack: "Lead"
    obvious: true
    weight: 1.5
    what_it_means: >
      Network redesign is mandatory post-M&A. All vendor contracts are
      under review. Window is open for 6–12 months post-close.
    how_to_detect: >
      SEC 8-K filings, press releases, trade press.
    sources:
      - "SEC EDGAR"
      - "Bloomberg"
      - "Reuters"
      - "Industry trade publications"
    classification:
      C: "Deal confirmed with SEC filing or press source"
      I: "Rumored or in due diligence"
      N: "No M&A activity found"

  # ── SUSTAINABILITY (SU) ────────────────────

  - code: "SU-01"
    name: "WAIRE Compliance Mandate"
    category: "Sustainability"
    stack: "Lead"
    obvious: false
    weight: 1.5
    priority_note: "Automatic Lead signal for any CA account with 250K+ sq ft DC."
    what_it_means: >
      California WAIRE program requires large DCs to reduce diesel yard
      equipment emissions or pay into a mitigation fund. Lazer's
      electrified and compliant spotters solve this directly.
    how_to_detect: >
      Any DC in California with 250,000+ sq ft triggers WAIRE.
      Cross-reference facility list with CA location.
    sources:
      - "CARB WAIRE program database"
      - "Company sustainability reports"
      - "CA facility addresses"
    classification:
      C: "CA facility confirmed at qualifying size"
      I: "CA presence confirmed but sq footage unverified"
      N: "No CA operations"
    known_accounts: ["Burlington Stores (3 CA DCs)", "Monster Beverage", "Chipotle", "Dole"]

  - code: "SU-02"
    name: "ESG / Scope 3 Emissions Commitments Published"
    category: "Sustainability"
    stack: "Support"
    obvious: true
    weight: 1.0
    what_it_means: >
      Scope 3 includes yard emissions. Lazer can reduce idle time and
      emissions — supporting compliance argument.
    how_to_detect: >
      Company sustainability report, ESG commitments page, CDP disclosure.
    sources:
      - "Company sustainability report"
      - "CDP database"
      - "GRI database"
    classification:
      C: "Scope 3 targets published with year"
      I: "ESG commitment mentioned without Scope 3 specifics"
      N: "No ESG reporting found"

  # ── SAFETY (SF) ────────────────────────────

  - code: "SF-01"
    name: "OSHA Citation Received"
    category: "Safety"
    stack: "Support"
    obvious: false
    weight: 1.25
    what_it_means: >
      Yard safety incident on record. Lazer's professional operation
      reduces OSHA exposure — compliance and liability argument.
    how_to_detect: >
      OSHA inspection database (public lookup), industry press,
      company disclosures.
    sources:
      - "OSHA IILS database — osha.gov/pls/imis/establishment.html"
      - "Legal filings"
    classification:
      C: "Citation found in OSHA database with case number"
      I: "Incident mentioned in press without OSHA record"
      N: "No citation found"

  # ── FINANCIAL (FN) ─────────────────────────

  - code: "FN-01"
    name: "PE Owned or PE-Backed"
    category: "Financial"
    stack: "Support"
    obvious: true
    weight: 1.5
    what_it_means: >
      PE ownership = structural cost pressure = outsourcing is attractive.
      Mandate to reduce headcount and convert fixed costs to variable.
    how_to_detect: >
      PitchBook, Crunchbase, company press releases, SEC filings.
    sources:
      - "PitchBook"
      - "Crunchbase"
      - "SEC EDGAR"
      - "Company ownership page"
    classification:
      C: "PE firm confirmed as owner with source"
      I: "Ownership structure suggests PE without direct confirmation"
      N: "Public company or family-owned confirmed"

  - code: "FN-02"
    name: "Cost-Cut Language in Public Communications"
    category: "Financial"
    stack: "Support"
    obvious: true
    weight: 1.25
    what_it_means: >
      Active cost reduction mandate confirmed. Keywords: 'streamlining',
      'rightsizing', 'operational efficiency' in earnings or press =
      outsourcing window open.
    how_to_detect: >
      Earnings call transcripts, press releases, annual reports.
    sources:
      - "Seeking Alpha earnings transcripts"
      - "SEC 10-K MD&A section"
      - "Company press releases"
    classification:
      C: "Specific language found with source URL"
      I: "Financial pressure inferred from restructuring news"
      N: "No cost-cut language found"

  # ── COMPETITIVE (CT) ───────────────────────

  - code: "CT-01"
    name: "Incumbent Vendor Known"
    category: "Competitive"
    stack: "Context"
    obvious: false
    weight: 1.0
    what_it_means: >
      If the current vendor is known, displacement messaging can be
      crafted specifically for their weaknesses.
    how_to_detect: >
      LinkedIn profiles of current yard staff, job postings mentioning
      vendor name, Glassdoor reviews, industry contacts.
    sources:
      - "LinkedIn"
      - "Glassdoor"
      - "Industry contacts"
    classification:
      C: "Vendor named with source"
      I: "In-house operation confirmed (no external vendor)"
      N: "Unknown"

# ─────────────────────────────────────────────
# 5. DISTRACTION SIGNALS
# ─────────────────────────────────────────────

distraction_signals:
  rule: >
    Research distraction signals BEFORE building outreach. Each DX signal has its
    own impact level: STOP (hard PENDING — do not outreach) or FLAG (note in dossier,
    proceed if Lead signals are confirmed). Check the impact field per signal.

  signals:
    - code: "DX-01"
      name: "Founder/CEO Accepting Outside Role"
      what_it_means: >
        Leadership attention moving away from operational decisions.
        Vendor pitches requiring CEO-level engagement will fail.
      how_to_detect: "News search, LinkedIn, press releases, X/Twitter"
      examples:
        - "Presidential commission"
        - "Board appointment at another company"
        - "Political role"
        - "Legal proceedings"
      classification:
        C: "Confirmed with source and date"
        N: "No outside role found"
      impact: "FLAG"
      impact_detail: >
        Lazer's buyer is VP Supply Chain / VP Logistics / VP DC Operations — NOT the CEO.
        A CEO accepting an outside role does NOT block VP-level outreach.
        Action: note in dossier Section 9 (Distraction Signals) as a barrier.
        Proceed with outreach if at least one Lead signal (LS-01, LB-01, LB-02, GR-01) is confirmed.
        Only move to PENDING if: (a) CEO is the confirmed sole decision-maker, OR
        (b) company has <100 employees where CEO handles all vendor decisions.

    - code: "DX-02"
      name: "Company in Active Legal/Regulatory Crisis"
      what_it_means: >
        Leadership consumed by legal proceedings. No bandwidth for
        new vendor decisions across the entire organization.
      how_to_detect: "SEC filings, court records, news search"
      classification:
        C: "Active case confirmed"
        N: "No legal issue found"
      impact: "STOP"
      impact_detail: "CONFIRMED → move to PENDING. Legal crisis affects all vendor decisions. Define reactivation trigger."

    - code: "DX-03"
      name: "Recent Mass Layoff or Hiring Freeze"
      what_it_means: >
        Cost-cutting that freezes ALL new vendor contracts — not just
        yard ops. Wrong moment regardless of signal strength.
      how_to_detect: "LinkedIn announcements, press releases, WARN Act filings"
      classification:
        C: "Layoff confirmed with date and scope"
        N: "Not found"
      impact: "STOP"
      impact_detail: "CONFIRMED → move to PENDING. Hiring freeze = vendor freeze. Define reactivation trigger."

# ─────────────────────────────────────────────
# 6. SIGNAL COMBOS (bonus points when both confirmed)
# ─────────────────────────────────────────────

signal_combos:
  - signals: ["LB-01", "LB-02", "FN-01"]
    bonus: 1.5
    story: "In-house AND can't staff AND cost pressure → strongest outsourcing argument"
  - signals: ["LS-01", "GR-02"]
    bonus: 1.5
    story: "New leader + M&A = vendor review window wide open NOW"
  - signals: ["GR-01", "YP-04"]
    bonus: 1.0
    story: "Confirmed greenfield at scale — no incumbent to displace"
  - signals: ["YP-02", "YP-01", "YP-03"]
    bonus: 0.5
    story: "24/7 + drop-hook + 50 docks = operationally certain need"

