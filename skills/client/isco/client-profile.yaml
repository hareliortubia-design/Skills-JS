# ─────────────────────────────────────────────
# OPEN GAPS — need discovery session with ISCO
# ─────────────────────────────────────────────

gaps:
  - id: "GAP-1"
    field: "client.buyers"
    question: "Which exact job title signs the PO? Who is the champion vs. the economic buyer?"
  - id: "GAP-2"
    field: "client.deal_profile.sales_cycle"
    question: "What is the typical sales cycle from first contact to signed order? Does it vary by project type?"
  - id: "GAP-3"
    field: "icp.criteria[1] — project scale"
    question: "What is the minimum project size or deal value that makes sense to pursue?"
  - id: "GAP-4"
    field: "icp.exclusions.industries_out"
    question: "Which industries or account types do they explicitly NOT want? (competitors, wrong scale, etc.)"
  - id: "GAP-5"
    field: "icp.exclusions.excluded_domains"
    question: "Which companies are existing customers or competitors to exclude from outreach?"
  - id: "GAP-6"
    field: "email_rules.tone"
    question: "What is the desired tone for outreach? What do they ask for in Email 1 — a call, a spec review, a visit?"
  - id: "GAP-7"
    field: "email_rules.offer.primary_cta"
    question: "What is the primary call to action? What low-risk offer can ISCO make to lower the barrier?"
  - id: "GAP-8"
    field: "crm.platform"
    question: "Which CRM does ISCO use? What are the actual field names for mapping?"

